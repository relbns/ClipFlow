name: ClipFlow
options:
  bundleIdPrefix: com.singalong
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    PRODUCT_NAME: ClipFlow
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  ClipFlow:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Sources/Resources
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: ClipFlow
        CFBundleIdentifier: com.singalong.clipflow
        CFBundleName: ClipFlow
        CFBundlePackageType: APPL
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: 1
        LSMinimumSystemVersion: 14.0
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Ariel Benesh. All rights reserved."
        NSPrincipalClass: NSApplication
    entitlements:
      path: Sources/Resources/ClipFlow.entitlements
      properties:
        com.apple.security.app-sandbox: false
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/ClipFlow.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.singalong.clipflow
        ENABLE_HARDENED_RUNTIME: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
